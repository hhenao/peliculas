name: Analisis SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonar:
    name: Revisar codigo con SonarQube
    runs-on: self-hosted

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Verificar Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$JAVA_HOME/bin/java"
          "$JAVA_HOME/bin/java" -version
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: Compilar api-gateway
        working-directory: api-gateway
        run: mvn clean package -DskipTests

      - name: Compilar eureka-server
        working-directory: eureka-server
        run: mvn clean package -DskipTests

      - name: Compilar peliculas-service
        working-directory: peliculas-service
        run: mvn clean package -DskipTests

      - name: Compilar usuarios-service
        working-directory: usuarios-service
        run: mvn clean package -DskipTests

      - name: Descargar SonarScanner sin unzip
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.2.0.5079-linux-x64.zip
          jar xf sonar-scanner-cli-7.2.0.5079-linux-x64.zip
          chmod +x sonar-scanner-7.2.0.5079-linux-x64/bin/sonar-scanner
          echo "$PWD/sonar-scanner-7.2.0.5079-linux-x64/bin" >> $GITHUB_PATH

      - name: Analizar codigo con SonarQube
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"

          java -version

          sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=peliculas \
            -Dsonar.projectName=peliculas \
            -Dsonar.projectVersion=1.0 \
            -Dsonar.sources=api-gateway/src,eureka-server/src,peliculas-service/src,usuarios-service/src,peliculas-frontend \
            -Dsonar.java.binaries=api-gateway/target/classes,eureka-server/target/classes,peliculas-service/target/classes,usuarios-service/target/classes \
            -Dsonar.exclusions=**/target/**,**/src/test/**,**/.git/** \
            -Dsonar.coverage.exclusions=**/model/**/*.java,**/dto/**/*.java