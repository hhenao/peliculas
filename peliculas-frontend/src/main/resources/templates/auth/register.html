<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body th:replace="~{layout :: layout(~{::section})}">

<section>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Registrar usuario</h1>

        <div th:if="${param.error}" class="alert alert-danger"
             style="max-width: 600px; margin: 20px auto;">
            <p class="error-message" th:text="${param.error}"></p>
        </div>

        <script th:if="${param.error}">
            console.log("error recibido:","[[${param.error}]]");
        </script>

        <form th:action="@{/register}" method="post">

            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" id="username" name="username"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password"
                       class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Registrar
            </button>
        </form>
    </div>

</section>

</body>
</html>
