<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<body>

<div class="text-center mt-5">
    <h1 style="font-size: 40px; font-weight: bold;">TOP Pelis UAH</h1>
    <p class="lead">Sistema de gestión de Películas y Actores</p>

    <img src="/logo_pelis.png" class="img-fluid mt-4" style="max-width: 300px;">
</div>

<h2 class="netflix-title">🔥 Top Películas Mejor Valoradas</h2>

<div class="row">

    <div class="col-lg-3 col-md-4 col-sm-6 mb-4"
         th:each="p : ${ranking}">

        <div class="card movie-card h-100">

            <a th:href="@{'/peliculas/ficha/' + ${p.idPelicula}}">

                <img th:if="${p.imagenPortada != null}"
                     th:src="@{'/img/peliculas/' + ${p.imagenPortada}}"
                     class="card-img-top">

                <img th:if="${p.imagenPortada == null}"
                     src="/img/peliculas/no-image.png"
                     class="card-img-top">
            </a>

            <div class="movie-info">

                <h5 th:text="${p.titulo}"></h5>

                <small>
                    <strong>Género:</strong>
                    <span th:text="${p.genero}"></span>
                </small>
                <br>

                <small>
                    <strong>Año:</strong>
                    <span th:text="${p.anio}"></span>
                </small>
                <br>

                <small>
                    <strong>Director:</strong>
                    <span th:text="${p.direccion}"></span>
                </small>

                <div class="mt-2 movie-rating">
                    ⭐ <span th:text="${#numbers.formatDecimal(p.media,1,1)}"></span>
                </div>

            </div>

        </div>

    </div>

</div>


</body>
</html>
